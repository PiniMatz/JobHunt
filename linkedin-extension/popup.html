<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent-purple: #8b5cf6;
      --accent-blue: #3b82f6;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --score-high: #10b981;
      --score-low: #ef4444;
    }
    body {
      width: 320px;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 1.25rem;
    }
    h2 {
      margin-top: 0;
      font-size: 1.15rem;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .status-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--bg-secondary);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .status-badge {
      font-weight: bold;
      padding: 0.15rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      font-size: 0.7rem;
    }
    .status-badge.online {
      background-color: rgba(16, 185, 129, 0.15);
      color: var(--score-high);
    }
    .status-badge.offline {
      background-color: rgba(239, 68, 68, 0.15);
      color: var(--score-low);
    }
    .btn {
      width: 100%;
      padding: 0.65rem;
      border-radius: 6px;
      border: none;
      background: linear-gradient(135deg, var(--accent-purple), var(--accent-blue));
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.9rem;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.25);
      transition: opacity 0.2s;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      box-shadow: none;
    }
    .progress-container {
      display: none;
      margin-top: 1rem;
      background-color: var(--bg-secondary);
      padding: 0.75rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.05);
      font-size: 0.85rem;
    }
    .progress-bar-bg {
      background-color: var(--bg-primary);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
      margin: 0.5rem 0;
    }
    .progress-bar-fill {
      background: linear-gradient(90deg, var(--accent-purple), var(--accent-blue));
      height: 100%;
      width: 0%;
      transition: width 0.3s;
    }
    .job-title {
      font-size: 0.75rem;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 0.25rem;
    }
    .result-message {
      display: none;
      margin-top: 1rem;
      padding: 0.75rem;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
    }
    .result-message.success {
      background-color: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
      color: var(--score-high);
    }
    .result-message.error {
      background-color: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: var(--score-low);
    }
  </style>
</head>
<body>
  <h2>💼 JobHunt Sync</h2>
  
  <div class="status-container">
    <span>Backend Connection:</span>
    <span id="conn-status" class="status-badge offline">Checking...</span>
  </div>
  
  <button id="scan-btn" class="btn" disabled>Scan Current Search Page 🚀</button>
  
  <div id="progress-box" class="progress-container">
    <div style="display: flex; justify-content: space-between; font-weight: 500;">
      <span>Scanning progress:</span>
      <span id="progress-text">0 / 0</span>
    </div>
    <div class="progress-bar-bg">
      <div id="progress-fill" class="progress-bar-fill"></div>
    </div>
    <div id="current-job" class="job-title">Preparing...</div>
  </div>
  
  <div id="result-box" class="result-message"></div>

  <script src="popup.js"></script>
</body>
</html>
